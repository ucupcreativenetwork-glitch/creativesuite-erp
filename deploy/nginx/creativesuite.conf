# CreativeSuite ERP — Nginx (Linux production)
# Salin: sudo cp creativesuite.conf /etc/nginx/sites-available/creativesuite
# Aktifkan: sudo ln -sf /etc/nginx/sites-available/creativesuite /etc/nginx/sites-enabled/
# Test: sudo nginx -t && sudo systemctl reload nginx

upstream creativesuite_frontend {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name 192.168.1.102 _;

    client_max_body_size 32M;

    # Laravel API (/api/v1/...)
    location /api {
        root /var/www/creativesuite-erp/public;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Health check
    location = /up {
        root /var/www/creativesuite-erp/public;
        try_files $uri /index.php?$query_string;
    }

    # Uploaded files (selfie absensi, dll.)
    location /storage {
        alias /var/www/creativesuite-erp/storage/app/public;
        expires 7d;
        add_header Cache-Control "public";
    }

    location ~ \.php$ {
        root /var/www/creativesuite-erp/public;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_read_timeout 120;
        fastcgi_hide_header X-Powered-By;
    }

    # Next.js web app
    location / {
        proxy_pass http://creativesuite_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
