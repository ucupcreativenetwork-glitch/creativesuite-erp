services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: creativesuite_erp
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DB_HOST: mysql
      DB_DATABASE: creativesuite_erp
      DB_USERNAME: root
      DB_PASSWORD: secret
    depends_on:
      - mysql
    command: php artisan serve --host=0.0.0.0 --port=8000

volumes:
  mysql_data: